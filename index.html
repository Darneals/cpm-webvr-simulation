<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CPM WebVR Simulation — Critical Path Method</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #05080f; overflow: hidden; }

      /* ── START SCREEN ── */
      #start-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, #05080f 0%, #0d0522 50%, #05080f 100%);
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; z-index: 9999; text-align: center; padding: 24px;
      }
      .sim-badge {
        display: inline-block; padding: 6px 20px; border-radius: 50px;
        font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
        margin-bottom: 20px; background: rgba(74,158,255,0.2);
        border: 1px solid #4a9eff; color: #4a9eff;
      }
      #start-screen h1 { font-size: 36px; color: #fff; margin-bottom: 12px; }
      #start-screen h1 span { color: #4a9eff; }
      .subtitle { color: #8899bb; max-width: 500px; margin-bottom: 32px; line-height: 1.6; }
      #start-btn {
        padding: 16px 52px; font-size: 16px; font-weight: 700;
        background: linear-gradient(135deg, #1a5fd4, #4a9eff);
        color: white; border: none; border-radius: 50px; cursor: pointer;
        box-shadow: 0 4px 24px rgba(74,158,255,0.4);
      }
      /* ── HUD ── */
      #hud { position: fixed; top: 0; left: 0; right: 0; display: none; z-index: 100; pointer-events: none; }
      #hud-bar { background: linear-gradient(180deg, rgba(5,8,15,0.95) 0%, transparent 100%); padding: 15px 25px; display: flex; justify-content: space-between; }
      #hud-title { font-size: 12px; color: #4a9eff; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
    </style>
  </head>

  <body>
    <div id="start-screen">
      <div class="sim-badge">UTP Malaysia - Research Project</div>
      <h1>CPM <span>Network</span> Simulation</h1>
      <p class="subtitle">Navigate the project lifecycle in 3D. Explore nodes to understand critical path dependencies and float values.</p>
      <button id="start-btn" onclick="startSimulation()">BEGIN SIMULATION</button>
    </div>

    <div id="hud">
      <div id="hud-bar">
        <div id="hud-title">Project Hub: Software Development Lifecycle</div>
      </div>
    </div>

    <a-scene
      background="color: #05080f"
      fog="type: exponential; color: #05080f; density: 0.012"
      renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
      screenshot="width: 3840; height: 2160"
    >
      <a-assets>
        <img id="img-a" src="assets/images/node_a.jpg">
        <img id="img-b" src="assets/images/node_b.jpg">
        <img id="img-c" src="assets/images/node_c.jpg">
        <img id="img-d" src="assets/images/node_d.jpg">
        <img id="img-e" src="assets/images/node_e.jpg">
        <img id="img-f" src="assets/images/node_f.jpg">
        <img id="img-g" src="assets/images/node_g.jpg">
        <img id="img-h" src="assets/images/node_h.jpg">
        <img id="img-i" src="assets/images/node_i.jpg">
      </a-assets>

      <a-light type="ambient" color="#1a1030" intensity="0.6"></a-light>
      <a-light type="point" color="#4a9eff" intensity="1.2" position="3 6 -5" distance="20"></a-light>
      <a-light type="point" color="#ff3333" intensity="0.8" position="-3 2 -8" distance="15"></a-light>
      <a-light type="directional" color="#ffffff" intensity="0.2" position="0 10 5"></a-light>

      <a-entity line="start:-4.5 1.8 -5.5; end:-1.5 1.8 -7.0; color:#ff3333; opacity:0.8"></a-entity>
      <a-entity line="start:-4.5 1.8 -5.5; end:-1.5 4.6 -6.5; color:#00cc66; opacity:0.8"></a-entity>
      <a-entity line="start:-1.5 1.8 -7.0; end:1.5 1.8 -8.5; color:#ff3333; opacity:0.8"></a-entity>
      <a-entity line="start:-1.5 4.6 -6.5; end:4.5 4.6 -7.0; color:#00cc66; opacity:0.8"></a-entity>
      <a-entity line="start:1.5 1.8 -8.5; end:4.5 1.8 -7.0; color:#ff3333; opacity:0.8"></a-entity>
      <a-entity line="start:4.5 4.6 -7.0; end:4.5 1.8 -7.0; color:#ffaa00; opacity:0.8"></a-entity>
      <a-entity line="start:4.5 1.8 -7.0; end:7.0 1.8 -6.0; color:#ff3333; opacity:0.8"></a-entity>
      <a-entity line="start:7.0 1.8 -6.0; end:9.0 1.8 -5.5; color:#ff3333; opacity:0.8"></a-entity>
      <a-entity line="start:9.0 1.8 -5.5; end:10.5 1.8 -4.5; color:#ff3333; opacity:0.8"></a-entity>

      <a-entity position="-4.5 1.8 -5.5">
        <a-torus radius="0.8" radius-tubular="0.02" color="#ff3333" animation="property:rotation; to:0 360 0; loop:true; dur:8000; easing:linear"></a-torus>
        <a-sphere radius="0.6" color="#cc1111" material="metalness:0.6; roughness:0.2; emissive:#550000; emissiveIntensity:0.7" link="href:node_a.html" class="clickable"></a-sphere>
        <a-text value="A\nFloat: 0" position="0 1.2 0" align="center" color="#ffaaaa" width="3"></a-text>
      </a-entity>

      <a-entity position="-1.5 4.6 -6.5">
        <a-torus radius="0.8" radius-tubular="0.02" color="#00cc66" animation="property:rotation; to:0 360 0; loop:true; dur:10000; easing:linear"></a-torus>
        <a-sphere radius="0.6" color="#008844" material="metalness:0.6; roughness:0.2; emissive:#002211; emissiveIntensity:0.7" link="href:node_b.html" class="clickable"></a-sphere>
        <a-text value="B\nFloat: 1" position="0 1.2 0" align="center" color="#88ffaa" width="3"></a-text>
      </a-entity>

      <a-entity position="1.5 1.8 -8.5">
        <a-torus radius="1.0" radius-tubular="0.03" color="#ff1111" animation="property:rotation; to:0 360 0; loop:true; dur:5000; easing:linear"></a-torus>
        <a-sphere radius="0.75" color="#dd0000" material="metalness:0.7; roughness:0.1; emissive:#770000; emissiveIntensity:0.9" link="href:node_d.html" class="clickable"></a-sphere>
        <a-text value="D\nCRITICAL" position="0 1.4 0" align="center" color="#ff6666" width="4"></a-text>
      </a-entity>

      <a-entity position="3 7 -10">
        <a-plane width="12" height="1" color="#0d0522" opacity="0.9"></a-plane>
        <a-text value="CRITICAL PATH METHOD NETWORK" position="0 0.2 0.01" align="center" color="#4a9eff" width="10" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
        <a-text value="Path: A-C-D-F-G-H-I | Duration: 20 Days" position="0 -0.2 0.01" align="center" color="#aabbcc" width="8"></a-text>
      </a-entity>

      <a-entity camera="fov: 70" look-controls position="3 2.5 8">
        <a-cursor fuse="true" fuse-timeout="2000" color="#4a9eff"></a-cursor>
      </a-entity>
    </a-scene>

    <script>
      function startSimulation() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
      }
    </script>
  </body>
</html>
