<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Figure 5 — Node D Interior</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene
      id="scene-d"
      fog="type: exponential; color: #020408; density: 0.06"
      renderer="antialias: true; colorManagement: true; sortObjects: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      loading-screen="enabled: false"
      screenshot="width: 3900; height: 2194"
    >
      <a-assets timeout="20000">
        <img id="bg-d" src="assets/images/node-d.jpg" crossorigin="anonymous" />
      </a-assets>

      <!-- 360 immersive background -->
      <a-sky src="#bg-d" rotation="0 -110 0"></a-sky>

      <!-- Lighting to enhance immersion -->
      <a-light type="ambient"     color="#221111" intensity="0.55"></a-light>
      <a-light type="directional" color="#ff6633" intensity="0.20" position="2 4 3"></a-light>
      <a-light type="point"       color="#ffaa44" intensity="0.35" position="0 3 -1" distance="12"></a-light>
      <a-light type="point"       color="#4466ff" intensity="0.18" position="2 1 -4" distance="10"></a-light>

      <!-- ── MAIN INFORMATION PANEL ── -->
      <!-- Perfectly centred at Z=-4, Y=2.1, facing camera at 0 0 0.5 -->
      <a-entity position="0 2.1 -4">

        <!-- Outer glow border -->
        <a-plane width="4.80" height="3.60" color="#880000" opacity="0.30" material="shader:flat"></a-plane>

        <!-- Main panel body -->
        <a-plane width="4.60" height="3.44" color="#05080f" opacity="0.96" material="shader:flat" position="0 0 0.01"></a-plane>

        <!-- Top accent — double stripe -->
        <a-plane width="4.60" height="0.20" color="#dd0000" opacity="1.0" material="shader:flat" position="0 1.72 0.02"></a-plane>
        <a-plane width="4.60" height="0.07" color="#ff6600" opacity="0.85" material="shader:flat" position="0 1.48 0.02"></a-plane>

        <!-- Node identifier -->
        <a-text value="TASK D   —   LONGEST CRITICAL TASK"
          position="0 1.18 0.03" align="center" color="#ff2222"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" width="4.3"></a-text>

        <!-- Task name -->
        <a-text value="Backend API Development"
          position="0 0.80 0.03" align="center" color="#ffffff" width="4.3"></a-text>

        <!-- Divider -->
        <a-plane width="4.2" height="0.012" color="#334455" opacity="0.9" material="shader:flat" position="0 0.54 0.03"></a-plane>

        <!-- Duration and Float -->
        <a-text value="Duration: 6 days"
          position="-1.2 0.28 0.03" align="center" color="#ffaa00" width="2.2"></a-text>
        <a-text value="Float: 0 days"
          position="1.2 0.28 0.03" align="center" color="#ff5555" width="2.2"></a-text>

        <!-- Dependency -->
        <a-text value="Depends on: Task C  (Database Schema Design)"
          position="0 -0.02 0.03" align="center" color="#9aabbb" width="4.2"></a-text>

        <!-- Divider -->
        <a-plane width="4.2" height="0.012" color="#334455" opacity="0.9" material="shader:flat" position="0 -0.28 0.03"></a-plane>

        <!-- Critical badge -->
        <a-plane width="4.2" height="0.50" color="#3a0000" opacity="0.95" material="shader:flat" position="0 -0.66 0.03"></a-plane>
        <a-text value="CRITICAL PATH   —   HIGHEST PROJECT RISK"
          position="0 -0.66 0.04" align="center" color="#ff2222"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt" width="4.0"></a-text>

        <!-- Schedule row -->
        <a-text value="Early Start: Day 5     |     Early Finish: Day 11"
          position="0 -1.08 0.03" align="center" color="#6677aa" width="4.2"></a-text>
        <a-text value="Late Start:  Day 5     |     Late Finish:  Day 11"
          position="0 -1.32 0.03" align="center" color="#6677aa" width="4.2"></a-text>

        <!-- Bottom accent -->
        <a-plane width="4.60" height="0.20" color="#dd0000" opacity="0.30" material="shader:flat" position="0 -1.72 0.02"></a-plane>
      </a-entity>

      <!-- ── NAVIGATION BUTTONS ── -->
      <a-entity position="-2.5 0.52 -4">
        <a-plane width="2.10" height="0.58" color="#0d1a2e" opacity="0.96" material="shader:flat"></a-plane>
        <a-plane width="2.10" height="0.04" color="#4a9eff" opacity="0.6" material="shader:flat" position="0 0.31 0.01"></a-plane>
        <a-text value="◀  Return to Network" position="0 0 0.02" align="center" color="#4a9eff" width="1.9"></a-text>
      </a-entity>

      <a-entity position="2.5 0.52 -4">
        <a-plane width="2.10" height="0.58" color="#1a0000" opacity="0.96" material="shader:flat"></a-plane>
        <a-plane width="2.10" height="0.04" color="#cc1111" opacity="0.6" material="shader:flat" position="0 0.31 0.01"></a-plane>
        <a-text value="Next: Task F  ▶" position="0 0 0.02" align="center" color="#ff6666" width="1.9"></a-text>
      </a-entity>

      <!-- ── CAMERA — straight-on, centred, no tilt ── -->
      <a-entity
        id="cam-d"
        camera="fov: 75; near: 0.1; far: 1000"
        look-controls="pointerLockEnabled: false"
        wasd-controls="acceleration: 12"
        position="0 2.1 0.5"
        rotation="0 0 0"
      >
        <a-cursor fuse="false" color="#ffffff" opacity="0" material="shader:flat"></a-cursor>
      </a-entity>
    </a-scene>

    <script>
      // Listen for capture message from parent figure-capture.html
      window.addEventListener('message', function(e) {
        if (e.data === 'capture') {
          var scene = document.getElementById('scene-d');
          if (!scene) return;
          scene.setAttribute('screenshot', {width: 3900, height: 2194});
          setTimeout(function() {
            scene.components.screenshot.capture('perspective');
          }, 400);
        }
      });
    </script>
  </body>
</html>
